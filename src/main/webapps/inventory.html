<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f5f5f5;
}

header{
    background:#0d6efd;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.cart{
    font-size:22px;
    cursor:pointer;
}

#cartCount{
    background:red;
    color:white;
    padding:2px 8px;
    border-radius:50%;
    font-size:14px;
}

.container{

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:25px;
    padding:30px;
}

.inventory-item{

    background:white;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    text-align:center;
    padding:20px;
}

.inventory-item img{
    width:200px;
    height:200px;
    object-fit:cover;
}

button{

    background:#0d6efd;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#c45c7b;
}

</style>

</head>

<body>

<header>

<h2>Products</h2>

<div class="cart">
🛒 Cart <span id="cartCount">0</span>
</div>

</header>

<div class="container" id="container">

<div class="inventory-item">

<img src="backpack.jpg">

<h3 class="inventory-item-name">Backpack</h3>

<p>$29.99</p>

<button onclick="addCart()" id="backpack">Add to Cart</button>

</div>

<div class="inventory-item">

<img src="laptop.jpg">

<h3 class="inventory-item-name">Laptop</h3>

<p>$899.99</p>

<button onclick="addCart()">Add to Cart</button>

</div>

<div class="inventory-item">

<img src="headphones.jpg">

<h3 class="inventory-item-name">Headphones</h3>

<p>$79.99</p>

<button onclick="addCart()">Add to Cart</button>

</div>

<div class="inventory-item">

<img src="keyboard.jpg">

<h3 class="inventory-item-name">Keyboard</h3>

<p>$49.99</p>

<button onclick="addCart()">Add to Cart</button>

</div>

<div class="inventory-item">

<img src="wireless-mouse.jpg">

<h3 class="inventory-item-name">Wireless Mouse</h3>

<p>$19.99</p>

<button onclick="addCart()">Add to Cart</button>

</div>

<div class="inventory-item">

<img src="mug.jpg">

<h3 class="inventory-item-name">Coffee Mug</h3>

<p>$9.99</p>

<button onclick="addCart()">Add to Cart</button>

</div>

</div>

<script>

let count=0;

function addCart(){

count++;

document.getElementById("cartCount").innerHTML=count;

}

</script>

</body>

</html>
