<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            /*background-color: #f2f2f2;*/
            /*background-color: #450b86;*/
           /*background-color: darkgrey;*/
            background-color: #0D6EFD;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 380px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #565657;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #450b86;
        }

        .message {
            text-align: center;
            margin-top: 10px;
            color: red;
        }
    </style>
</head>

<body>
<header>
<div>
    <div style="position: fixed; top: 10px; right: 10px;">
    
    <a href="login.html" id="login" style="
        background-color: #1d1e1f31;
        color: white;
        padding: 6px 12px;
        text-decoration: none;
        border-radius: 5px;">
        Login</a>
        <a href="registration.html" style="
        background-color: #1d1e1f31;
        color: white;
        padding: 6px 12px;
        text-decoration: none;
        border-radius: 5px;">Sign Up</a>
        
</div>
    <div><img style="width:800px; height:500px;" id="framework-image" src="Framework Architecture.jpeg"></div>
</div>

<script>
    function validateLogin() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "admin" && pass === "1234") {
            document.getElementById("message").style.color = "450b86";
            document.getElementById("message").innerText = "Login Successful!";
        } else {
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "Invalid Credentials!";
        }
    }
</script>

</body>
</html>
